name: SAST - Static Code Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  codeql-analysis:
    name: CodeQL Analysis (.NET)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build for analysis
        run: dotnet build src/CommunicationControl/DevOpsProject/DevOpsProject.CommunicationControl.API.csproj -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (API Dockerfile)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'src/CommunicationControl/Dockerfile'
          format: 'table'

      - name: Run Trivy vulnerability scanner (Frontend Dockerfile)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'src/MapClient/Dockerfile'
          format: 'table'
