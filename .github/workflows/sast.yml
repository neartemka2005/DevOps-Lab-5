name: SAST - Static Code Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  trivy-scan:
    name: Trivy Static Site Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy misconfiguration scan (docker-compose)
        if: hashFiles('docker-compose.yml') != ''
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'config'
          scan-ref: 'docker-compose.yml'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

      - name: Run Trivy misconfiguration scan (GitHub workflows)
        if: hashFiles('.github/workflows/*.yml') != ''
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'config'
          scan-ref: '.github/workflows'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

      - name: Run Trivy secret scan (static-site)
        if: hashFiles('static-site/**') != ''
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: 'static-site'
          scanners: 'secret'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'
